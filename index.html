  locking: "locking.jpg",

  hiphop: "hiphop.jpg",
  girlshiphop: "girlshiphop.jpg",
  popping: "popping.jpg",
  breaking: "breaking.jpg",
  house: "house.jpg",
  krump: "krump.jpg"
};

    function showQuestion() {
      const questionEl = document.getElementById("question");
      const answersEl = document.getElementById("answers");

      if (currentQuestion >= questions.length) {
        showResult();
        return;
      }

      const current = questions[currentQuestion];
      questionEl.innerText = current.text;
      answersEl.innerHTML = "";
      
      questionEl.classList.remove("fadeIn");
      void questionEl.offsetWidth; // 리플로우 강제
      questionEl.classList.add("fadeIn");

      current.answers.forEach(answer => {
        const btn = document.createElement("button");
        btn.innerText = answer.text;
        btn.onclick = () => selectAnswer(answer.scores);
        answersEl.appendChild(btn);
      });
    }

    function selectAnswer(answerScores) {
      for (let key in answerScores) {
        score[key] += answerScores[key];
      }

      currentQuestion++;
      showQuestion();
    }

function showResult() {
  const resultEl = document.getElementById("result");
  const quizEl = document.getElementById("quiz");
  quizEl.style.display = "none";

  let dots = 0;

  const loadingInterval = setInterval(() => {
    dots = (dots + 1) % 6;
    resultEl.innerHTML =
      "🔎 당신에게 추천할 장르를 분석 중입니다" + ".".repeat(dots);
  }, 250);

  
  // 2~4초 후 결과 출력
  const randomDelay = Math.floor(Math.random() * 1201) + 2000;
  setTimeout(() => {
    clearInterval(loadingInterval);
    calculateResult();
  }, randomDelay);
}

function calculateResult() {
  const resultEl = document.getElementById("result");

  const genreNames = {
    locking: "락킹",
    waacking: "왁킹",
    hiphop: "힙합",
    girlshiphop: "걸스힙합",
    popping: "팝핑",
    breaking: "브레이킹",
    house: "하우스",
    krump: "크럼프"
  };

  for (let key in score) {
    score[key] = Math.round(score[key] * 10) / 10;
  }

  let maxScore = Math.max(...Object.values(score));

  let topGenres = [];
  for (let key in score) {
    if (score[key] === maxScore) {
      topGenres.push(key);
    }
  }

  let resultGenre =
    topGenres[Math.floor(Math.random() * topGenres.length)];

  

  lastResultGenre = resultGenre;

resultEl.innerHTML = `
  🎉 당신에게 어울리는 장르는! 🎉 <br><br>
   <strong style="font-size:28px;">${genreNames[resultGenre]}</strong> 


  <br><br>
  <button onclick="restartQuiz()">🔁 다시하기</button>
  <button onclick="showDescription()">📖 장르 설명 보기</button>
`;
}

function restartQuiz() {
  currentQuestion = 0;

  for (let key in score) {
    score[key] = 0;
  }

  document.getElementById("result").innerHTML = "";
  document.getElementById("quiz").style.display = "none";
  document.getElementById("start-screen").style.display = "block";
}

function startQuiz() {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("quiz").style.display = "block";

  showQuestion();
}

function showDescription() {
  const resultEl = document.getElementById("result");

  resultEl.innerHTML = `
    <h2>🔥 ${lastResultGenre.toUpperCase()}</h2>
    <p style="margin-top:20px;">
      ${genreDescriptions[lastResultGenre]}
    </p>

    <br><br>
    <button onclick="restartQuiz()">🔁 다시하기</button>
  `;
}
